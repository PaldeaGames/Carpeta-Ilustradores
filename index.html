<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartas Pokémon por Ilustrador</title>
<style>
:root{--bg:#0d0d1a;--surf:#141428;--surf2:#1c1c38;--brd:#2a2a50;--acc:#7c5cbf;--gold:#e8c84a;--rev:#ff6b35;--tx:#e8e6f0;--txm:#8885a8}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif}
header{background:linear-gradient(135deg,#0d0d1a,#1a0d2e);border-bottom:2px solid var(--acc);padding:16px 24px;display:flex;align-items:center;gap:14px}
.ball{width:38px;height:38px;background:radial-gradient(circle at 35% 35%,#ff6b6b,#cc0000);border-radius:50%;border:3px solid #fff;flex-shrink:0;position:relative}
.ball::after{content:'';position:absolute;top:50%;left:0;right:0;height:2px;background:#fff;transform:translateY(-50%)}
.ball::before{content:'';position:absolute;top:50%;left:50%;width:10px;height:10px;background:#fff;border-radius:50%;transform:translate(-50%,-50%);border:2px solid #888}
header h1{font-size:1.3rem;font-weight:700}
header p{font-size:.78rem;color:var(--txm);margin-top:2px}
.pbar{background:var(--surf);border-bottom:1px solid var(--brd);padding:8px 24px;font-size:.8rem;color:var(--txm);display:none;align-items:center;gap:10px}
.pbar.show{display:flex}
progress{flex:1;max-width:300px;height:7px}
.tabs{display:flex;gap:2px;padding:10px 24px 0;background:var(--surf);border-bottom:1px solid var(--brd);overflow-x:auto}
.tb{background:none;border:none;color:var(--txm);padding:8px 16px;border-radius:6px 6px 0 0;cursor:pointer;font-size:.86rem;font-weight:500;white-space:nowrap;border-bottom:3px solid transparent;transition:all .2s}
.tb:hover{background:var(--surf2);color:var(--tx)}
.tb.on{color:var(--gold);border-bottom-color:var(--gold);background:var(--surf2)}
.tab{display:none;padding:16px 24px}
.tab.on{display:block}
.iln{font-size:1.2rem;font-weight:700;color:var(--gold);margin-bottom:10px}
.bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.bar input,.bar select{background:var(--surf2);border:1px solid var(--brd);color:var(--tx);padding:6px 10px;border-radius:6px;font-size:.81rem;outline:none}
.bar input:focus,.bar select:focus{border-color:var(--acc)}
.bar input{flex:1;min-width:130px}
.vb{background:var(--surf2);border:1px solid var(--brd);color:var(--txm);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:.78rem;transition:all .2s}
.vb.on,.vb:hover{background:var(--acc);color:#fff;border-color:var(--acc)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:12px}
.ci{background:var(--surf2);border:1px solid var(--brd);border-radius:10px;overflow:hidden;position:relative;transition:transform .15s}
.ci:hover{transform:translateY(-2px)}
.ci.rev{border-color:var(--rev);box-shadow:0 0 7px rgba(255,107,53,.2)}
.imgw{background:#050510;display:flex;align-items:center;justify-content:center;min-height:125px;overflow:hidden;position:relative;cursor:pointer}
.imgw:hover::after{content:'✏️ Cambiar';position:absolute;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;font-size:.85rem;color:#fff;font-weight:700}
.imgw img{width:100%;height:auto;display:block}
.ph{color:var(--txm);font-size:.71rem;text-align:center;padding:10px;line-height:1.5}
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.vbdg{position:absolute;top:5px;right:5px;padding:2px 6px;border-radius:8px;font-size:.65rem;font-weight:700;z-index:2;pointer-events:none}
.vnrm{background:#1c1c38;border:1px solid #3a3a60;color:#aaa8d0}
.vrev{background:#3a1505;border:1px solid #7a3a18;color:#ff8c5a}
.vjp{background:#0a2218;border:1px solid #1a4832;color:#5cc896}
.vstm{background:#1a1a08;border:1px solid #4a4a18;color:#c8c838}
.vfr{background:#0a1820;border:1px solid #1a3850;color:#5898c8}
.ven{background:#1c1c38;border:1px solid #5050a0;color:#9898e0}
.info{padding:7px 9px}
.pn{font-weight:700;font-size:.84rem}
.sn{font-size:.71rem;color:var(--txm);margin:2px 0}
.cn{font-family:monospace;font-size:.71rem;color:var(--gold)}
.dl-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.dlbtn{background:var(--acc);border:none;color:#fff;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:600}
.dlbtn:hover{opacity:.85}
.dlbtn.sec{background:var(--surf2);border:1px solid var(--brd);color:var(--txm)}
.nores{text-align:center;padding:30px;color:var(--txm)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.modal-bg.show{display:flex}
.modal{background:var(--surf);border:1px solid var(--brd);border-radius:12px;width:100%;max-width:560px;padding:20px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:1rem;color:var(--gold);margin-bottom:12px}
.modal-search{display:flex;gap:8px;margin-bottom:12px}
.modal-search input{flex:1;background:var(--surf2);border:1px solid var(--brd);color:var(--tx);padding:8px 11px;border-radius:6px;font-size:.83rem;outline:none}
.modal-search input:focus{border-color:var(--acc)}
.modal-search button{background:var(--acc);border:none;color:#fff;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:.83rem}
.modal-results{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:12px}
.mcard{background:var(--surf2);border:2px solid var(--brd);border-radius:8px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.mcard:hover{border-color:var(--acc)}
.mcard.sel{border-color:var(--gold)}
.mcard img{width:100%;height:auto;display:block}
.mcard-name{font-size:.7rem;padding:4px 6px;color:var(--txm);text-align:center}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btns button{padding:7px 16px;border-radius:6px;cursor:pointer;font-size:.82rem;border:none}
.btn-cancel{background:var(--surf2);color:var(--txm);border:1px solid var(--brd)!important}
.btn-ok{background:var(--acc);color:#fff}
.modal-info{font-size:.78rem;color:var(--txm);margin-bottom:10px}
.modal-status{font-size:.78rem;color:var(--txm);padding:8px 0;text-align:center}
</style>
</head>
<body>

<!-- MODAL EDICIÓN -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <h2 id="modalTitle">Cambiar imagen de carta</h2>
    <div class="modal-info" id="modalInfo"></div>
    <div class="modal-search">
      <input type="text" id="modalSearchInput" placeholder="Nombre del Pokémon..." onkeydown="if(event.key==='Enter')modalSearch()">
      <button onclick="modalSearch()">Buscar</button>
    </div>
    <div class="modal-status" id="modalStatus"></div>
    <div class="modal-results" id="modalResults"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-ok" onclick="applyModal()">Usar esta imagen</button>
    </div>
  </div>
</div>

</header>

// pokemoncard.io set ID map
var PCIO={"sts":"xy11","cpa":"swsh35","sm11":"sm11","xy7":"bw11","sm1":"sm1","sm12":"sm12","swsh9":"swsh9","swsh3":"swsh3","swsh11":"swsh11","pgo":"pgo","sv10":"sv10","sv9pt5":"sv9pt5","sv8pt5":"sv8pt5","sm10":"sm10","sm7":"sm7","sm2":"sm2","swsh7":"swsh7","swsh4":"swsh4","sv3":"sv3","swsh12":"swsh12","sv1":"sv1","swsh8":"swsh8","swsh6":"swsh6","xy6":"xy6","sv7":"sv7","xy7b":"xy7b","swsh1":"swsh1","swsh12pt5":"swsh12pt5","swsh10":"swsh10","sv10pt5":"sv10pt5","sv3pt5":"sv3pt5","sv5":"sv5","swsh5":"swsh5","sv4":"sv4","sv6":"sv6","sv8":"sv8","sm8":"sm8","xy9":"xy9","sv2":"sv2","swsh2":"swsh2","xy8":"xy8","ex6":"ex6","ex12":"ex12","dp4":"dp4","ex11":"ex11","sm9":"sm9","sm6":"sm6","sm3":"sm3","sm5":"sm5","xy5":"xy5","xy10":"xy10","sm75":"sm75","swsh45":"swsh45","sm4":"sm4","ex7":"ex7","ex14":"ex14","neo1":"neo1","pl2":"pl2","pl1":"pl1","xy2":"xy2","ex2":"ex2","xy9b":"xy9b"};
function directImg(code,num){var p=PCIO[code];if(!p||!num)return null;return 'https://images.pokemoncard.io/images/'+p+'/'+p+'-'+num+'.png';}

// IMG_CACHE: cacheKey -> url string (or null if not found)
// OVERRIDES: cardN -> url string (manual corrections)
var IMG_CACHE={}, OVERRIDES={};
var VM={ym:'grid',tk:'grid',ai:'grid',yb:'grid'};
var VF={ym:'',tk:'',ai:'',yb:''}, QF={ym:'',tk:'',ai:'',yb:''};
var TABS={ym:'Yuka Morii',tk:'Tomokazu Komiya',ai:'Asako Ito',yb:'Yukiko Baba'};
var currentIl='ym';

// Modal state
var modalCard=null, modalSelected=null;

function ck(r){return r[2]+'-'+r[3];}
function imgForCard(r){
  if(OVERRIDES[r[0]]) return OVERRIDES[r[0]];
  if(!r[2]||!r[3]) return null;
  var key=ck(r);
  if(IMG_CACHE[key]) return IMG_CACHE[key];
  return directImg(r[2],r[3]);
}
function vCls(v){
  var l=v.toLowerCase();
  if(l.indexOf('reverse')>=0)return 'vrev';
  if(l==='jp')return 'vjp';
  if(l==='stamped')return 'vstm';
  if(l.indexOf('(fr)')>=0)return 'vfr';
  if(l.indexOf('(en)')>=0)return 'ven';
  return 'vnrm';
}
function vIcon(v){
  var l=v.toLowerCase();
  if(l.indexOf('reverse')>=0)return '⬡ ';
  if(l==='jp')return '🇯🇵 ';
  if(l==='stamped')return '✦ ';
  return '';
}

async function fetchImg(setId,num){
  var key=setId+'-'+num;
  if(IMG_CACHE[key]!==undefined) return IMG_CACHE[key];
  try{
    var r=await fetch('https://api.pokemontcg.io/v2/cards?q=set.id%3A'+setId+'+number%3A'+num+'&select=id,images');
    var d=await r.json();
    if(d.data&&d.data.length>0){IMG_CACHE[key]=d.data[0].images.small;saveState();return IMG_CACHE[key];}
  }catch(e){}
  IMG_CACHE[key]=null;
  saveState();
  return null;
}

async function preloadTab(il){render(il);}

function updateCardImgEl(r){
  var url=imgForCard(r);
  var els=document.querySelectorAll('[data-cn="'+r[0]+'"]');
  for(var i=0;i<els.length;i++){
    var w=els[i];
    if(url){
      w.innerHTML='<img src="'+url+'" alt="'+r[1]+'" style="width:100%;height:auto;display:block">';
    } else {
      w.innerHTML='<div class="ph">Sin imagen<br><small style="font-size:.65rem">Click para buscar</small></div>';
    }
  }
}

function build(il){
  var el=document.getElementById('tab-'+il);
  var rows=CARDS.filter(function(r){return r[5]===il;});
  var rev=rows.filter(function(r){return r[4].toLowerCase().indexOf('reverse')>=0;}).length;
  var jp=rows.filter(function(r){return r[4]==='JP';}).length;
  el.innerHTML='<div class="iln">'+TABS[il]+' <small style="font-size:.74rem;font-weight:400;color:var(--txm)">'+rows.length+' cartas &middot; '+rev+' reverse &middot; '+jp+' JP</small></div>'
    +'<div class="dl-bar">'
    +'<button class="dlbtn" onclick="dlAll(\''+il+'\')">&#x2B07; Descargar imágenes</button>'
    
    +'</div>'
    +'<div class="bar">'
    +'<input type="text" placeholder="Buscar..." oninput="setQ(\''+il+'\',this.value)">'
    +'<select onchange="setVF(\''+il+'\',this.value)">'
    +'<option value="">Todas</option><option value="normal">Normal</option>'
    +'<option value="reverse">Reverse</option><option value="jp">JP</option>'
    +'<option value="stamped">Stamped</option><option value="(fr)">FR</option><option value="(en)">EN</option>'
    +'</select>'
    +'<button class="vb on" onclick="setV(\''+il+'\',\'grid\',this)">&#x229E; Galería</button>'
    +'<button class="vb" onclick="setV(\''+il+'\',\'table\',this)">&#x2630; Tabla</button>'
    +'</div>'
    +'<div id="v-'+il+'"></div>';
  render(il);
  preloadTab(il);
}

function render(il){
  var rows=CARDS.filter(function(r){return r[5]===il;});
  var q=QF[il].toLowerCase(), vfv=VF[il];
  var filtered=rows.filter(function(r){
    return (!q||r[1].toLowerCase().indexOf(q)>=0||r[6].toLowerCase().indexOf(q)>=0)
        &&(!vfv||r[4].toLowerCase().indexOf(vfv)>=0);
  });
  var cont=document.getElementById('v-'+il);
  if(!filtered.length){cont.innerHTML='<div class="nores">Sin resultados</div>';return;}

  var h='<div class="grid">';
  filtered.forEach(function(r){
    var isR=r[4].toLowerCase().indexOf('reverse')>=0;
    var url=imgForCard(r);
    var cached=r[2]&&r[3]?(IMG_CACHE[ck(r)]!==undefined):false;
    var imgContent;
    if(url){
      imgContent='<img src="'+url+'" alt="'+r[1]+'" style="width:100%;height:auto;display:block">';
    } else if(cached||!r[2]){
      imgContent='<div class="ph">Sin imagen<br><small style="font-size:.65rem">Click para buscar</small></div>';
    } else {
      imgContent='<div class="ph"><div class="spin"></div></div>';
    }
    var note=r[7]?' <small style="color:var(--gold);font-size:.63rem">('+r[7]+')</small>':'';
    h+='<div class="ci'+(isR?' rev':'')+'"><div class="imgw" data-cn="'+r[0]+'" onclick="openEdit('+r[0]+')">'+imgContent+'</div>'
      +'<span class="vbdg '+vCls(r[4])+'">'+vIcon(r[4])+r[4]+'</span>'
      +'<div class="info"><div class="pn">'+r[1]+note+'</div>'
      +'<div class="sn">'+r[6]+'</div>'
      +'<div class="cn">'+(r[2]||'—')+' &middot; '+(r[3]||'—')+'</div>'
      +'</div></div>';
  });
  h+='</div>';
  cont.innerHTML=h;
}


function setQ(il,v){QF[il]=v;render(il);}
function setVF(il,v){VF[il]=v;render(il);}
function setV(il,mode,btn){
  VM[il]=mode;
  document.querySelectorAll('#tab-'+il+' .vb').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  render(il);
}
function showTab(il,btn){
  currentIl=il;
  document.querySelectorAll('.tab').forEach(function(e){e.classList.remove('on');});
  document.querySelectorAll('.tb').forEach(function(b){b.classList.remove('on');});
  document.getElementById('tab-'+il).classList.add('on');
  btn.classList.add('on');
}

// ── MODAL ──
function openEdit(cardN){
  var r=CARDS.find(function(c){return c[0]===cardN;});
  if(!r) return;
  modalCard=r; modalSelected=null;
  document.getElementById('modalTitle').textContent='Cambiar imagen: #'+r[0]+' '+r[1];
  document.getElementById('modalInfo').textContent=r[6]+' · '+r[4];
  document.getElementById('modalSearchInput').value=r[1];
  document.getElementById('modalResults').innerHTML='';
  document.getElementById('modalStatus').textContent='';
  document.getElementById('editModal').className='modal-bg show';
  modalSearch();
}
function closeModal(){
  document.getElementById('editModal').className='modal-bg';
  modalCard=null; modalSelected=null;
}
async function modalSearch(){
  var q=document.getElementById('modalSearchInput').value.trim();
  if(!q) return;
  document.getElementById('modalStatus').textContent='Buscando...';
  document.getElementById('modalResults').innerHTML='';
  modalSelected=null;
  try{
    var url='https://api.pokemontcg.io/v2/cards?q=name%3A'+encodeURIComponent(q)+'&pageSize=20&select=id,name,set,number,images';
    var resp=await fetch(url);
    var data=await resp.json();
    var cards=data.data||[];
    document.getElementById('modalStatus').textContent=cards.length?'':'Sin resultados';
    var h='';
    cards.forEach(function(c){
      h+='<div class="mcard" data-cid="'+c.id+'" data-img="'+c.images.small+'" onclick="selectModal(this,\''+c.id+'\',\''+c.images.small+'\')">'
        +'<img src="'+c.images.small+'" alt="'+c.name+'">'
        +'<div class="mcard-name">'+c.name+'<br><small>'+c.set.name+' #'+c.number+'</small></div>'
        +'</div>';
    });
    document.getElementById('modalResults').innerHTML=h;
  } catch(e){
    document.getElementById('modalStatus').textContent='Error al buscar';
  }
}
function selectModal(el,cid,img){
  document.querySelectorAll('.mcard').forEach(function(c){c.classList.remove('sel');});
  el.classList.add('sel');
  modalSelected={cid:cid,img:img};
}
function applyModal(){
  if(!modalSelected||!modalCard){closeModal();return;}
  OVERRIDES[modalCard[0]]=modalSelected.img;
  // Also cache it
  if(modalCard[2]&&modalCard[3]) IMG_CACHE[ck(modalCard)]=modalSelected.img;
  // Update all visible elements for this card
  updateCardImgEl(modalCard);
  saveState();
  closeModal();
}

// ── DOWNLOAD ──
async function dlAll(il){
  var rows=CARDS.filter(function(r){return r[5]===il;});
  var q=QF[il].toLowerCase(), vfv=VF[il];
  var filtered=rows.filter(function(r){
    return (!q||r[1].toLowerCase().indexOf(q)>=0||r[6].toLowerCase().indexOf(q)>=0)
        &&(!vfv||r[4].toLowerCase().indexOf(vfv)>=0);
  });
  var count=0;
  var seen={};
  for(var i=0;i<filtered.length;i++){
    var r=filtered[i];
    var url=imgForCard(r);
    if(!url) continue;
    var key=(r[2]||'')+'_'+(r[3]||'');
    if(seen[key]) continue;
    seen[key]=1;
    var fname=String(r[0]).padStart(3,'0')+'_'+r[1].replace(/[^a-zA-Z0-9]/g,'_')+'_'+(r[2]||'jp')+'_'+(r[3]||r[0])+'.png';
    try{
      // Use canvas proxy to bypass CORS
      var img2=new Image();
      img2.crossOrigin='anonymous';
      var downloaded=await new Promise(function(resolve){
        img2.onload=function(){
          try{
            var canvas=document.createElement('canvas');
            canvas.width=img2.naturalWidth;
            canvas.height=img2.naturalHeight;
            var ctx=canvas.getContext('2d');
            ctx.drawImage(img2,0,0);
            canvas.toBlob(function(blob){
              var a=document.createElement('a');
              a.href=URL.createObjectURL(blob);
              a.download=fname;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              URL.revokeObjectURL(a.href);
              resolve(true);
            },'image/png');
          }catch(e){resolve(false);}
        };
        img2.onerror=function(){resolve(false);};
        img2.src=url+'?t='+Date.now();
      });
      if(downloaded) count++;
    }catch(e){}
    await new Promise(function(res){setTimeout(res,400);});
  }
  alert('Listo: '+count+' imágenes descargadas');
}
// ── LOCALSTORAGE PERSISTENCE ──
function saveState(){
  try{
    localStorage.setItem('ptcg_overrides', JSON.stringify(OVERRIDES));
    localStorage.setItem('ptcg_imgcache', JSON.stringify(IMG_CACHE));
  }catch(e){}
}
function loadState(){
  try{
    var ov=localStorage.getItem('ptcg_overrides');
    if(ov) OVERRIDES=JSON.parse(ov);
    var ic=localStorage.getItem('ptcg_imgcache');
    if(ic) IMG_CACHE=JSON.parse(ic);
  }catch(e){}
}
function clearState(){
  if(!confirm('¿Borrar todo el progreso guardado?')) return;
  localStorage.removeItem('ptcg_overrides');
  localStorage.removeItem('ptcg_imgcache');
  OVERRIDES={}; IMG_CACHE={};
  Object.keys(TABS).forEach(function(il){render(il);});
}

// Close modal on bg click
document.getElementById('editModal').addEventListener('click',function(e){if(e.target===this)closeModal();});

loadState();
Object.keys(TABS).forEach(function(il){build(il);});
