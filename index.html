.ball::after{content:'';position:absolute;top:50%;left:0;right:0;height:2px;background:#fff;transform:translateY(-50%)}
.ball::before{content:'';position:absolute;top:50%;left:50%;width:11px;height:11px;background:#fff;border-radius:50%;transform:translate(-50%,-50%);border:2px solid #888}
header h1{font-size:1.4rem;font-weight:700}

.tabs{display:flex;gap:2px;padding:12px 24px 0;background:var(--surf);border-bottom:1px solid var(--brd);overflow-x:auto}
.tb{background:none;border:none;color:var(--txm);padding:8px 16px;border-radius:6px 6px 0 0;cursor:pointer;font-size:.87rem;font-weight:500;white-space:nowrap;border-bottom:3px solid transparent;transition:all .2s}
.tb:hover{background:var(--surf2);color:var(--tx)}
.tb.on{color:var(--gold);border-bottom-color:var(--gold);background:var(--surf2)}
.tab{display:none;padding:18px 24px}
.tab.on{display:block}
.iln{font-size:1.3rem;font-weight:700;color:var(--gold);margin-bottom:12px}
.bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.bar input,.bar select{background:var(--surf2);border:1px solid var(--brd);color:var(--tx);padding:7px 11px;border-radius:6px;font-size:.82rem;outline:none}
.bar input:focus,.bar select:focus{border-color:var(--acc)}
.bar input{flex:1;min-width:140px}
.vb{background:var(--surf2);border:1px solid var(--brd);color:var(--txm);padding:6px 11px;border-radius:6px;cursor:pointer;font-size:.79rem;transition:all .2s}
.vb.on,.vb:hover{background:var(--acc);color:#fff;border-color:var(--acc)}
.tot{background:linear-gradient(135deg,#1a1040,#0d1a2e);border:1px solid var(--acc);border-radius:7px;padding:9px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.tot .l{font-size:.8rem;color:var(--txm)}
.tot .a{font-size:1.2rem;font-weight:700;color:var(--gold)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px}
.ci{background:var(--surf2);border:1px solid var(--brd);border-radius:10px;overflow:hidden;transition:transform .15s,box-shadow .15s;position:relative}
.ci:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.5)}
.ci.rev{border-color:var(--rev);box-shadow:0 0 8px rgba(255,107,53,.2)}
.imgw{background:#050510;display:flex;align-items:center;justify-content:center;min-height:130px;position:relative;overflow:hidden}
.imgw img{width:100%;height:auto;display:block}
.ph{color:var(--txm);font-size:.72rem;text-align:center;padding:10px;line-height:1.4}
.vbdg{position:absolute;top:5px;right:5px;padding:2px 7px;border-radius:8px;font-size:.67rem;font-weight:700;z-index:2}
.vnrm{background:#1c1c38;border:1px solid #3a3a60;color:#aaa8d0}
.vrev{background:#3a1505;border:1px solid #7a3a18;color:#ff8c5a}
.vjp{background:#0a2218;border:1px solid #1a4832;color:#5cc896}
.vstm{background:#1a1a08;border:1px solid #4a4a18;color:#c8c838}
.vfr{background:#0a1820;border:1px solid #1a3850;color:#5898c8}
.ven{background:#1c1c38;border:1px solid #5050a0;color:#9898e0}
.info{padding:8px 10px}
.pn{font-weight:700;font-size:.86rem}
.sn{font-size:.73rem;color:var(--txm);margin:2px 0}
.cn{font-family:monospace;font-size:.73rem;color:var(--gold)}
.pr{display:flex;align-items:center;gap:5px;margin-top:6px}
.pr label{font-size:.72rem;color:var(--txm)}
.pi{background:var(--surf);border:1px solid var(--brd);color:var(--tx);padding:4px 6px;border-radius:5px;font-size:.79rem;width:70px;outline:none;text-align:right;font-family:monospace}
.pi:focus{border-color:var(--acc)}
table{width:100%;border-collapse:collapse;font-size:.84rem}
thead th{background:var(--surf2);color:var(--txm);font-weight:600;font-size:.71rem;text-transform:uppercase;letter-spacing:.7px;padding:8px 10px;text-align:left;border-bottom:1px solid var(--brd);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--brd);transition:background .1s}
tbody tr:hover{background:rgba(124,92,191,.07)}
tbody tr.rev{border-left:3px solid var(--rev)}
td{padding:8px 10px;vertical-align:middle}
.rn{color:var(--txm);font-size:.72rem}
.pname{font-weight:600}
.note{font-size:.67rem;color:var(--gold);display:block}
.cb{background:var(--surf2);border:1px solid var(--brd);border-radius:3px;padding:2px 5px;font-size:.72rem;font-family:monospace;color:var(--gold)}
.nb{font-family:monospace;font-size:.82rem}
.vspan{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:.74rem;font-weight:600}
.tpi{background:var(--surf2);border:1px solid var(--brd);color:var(--tx);padding:4px 6px;border-radius:5px;font-size:.82rem;width:76px;outline:none;text-align:right;font-family:monospace}
.tpi:focus{border-color:var(--acc)}
.nores{text-align:center;padding:36px;color:var(--txm)}
.dl-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.dlbtn{background:var(--acc);border:none;color:#fff;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.82rem;font-weight:600;transition:opacity .2s}
.dlbtn:hover{opacity:.85}
.dlbtn.sec{background:var(--surf2);border:1px solid var(--brd);color:var(--txm)}

var TABS={ym:'Yuka Morii',tk:'Tomokazu Komiya',ai:'Asako Ito',yb:'Yukiko Baba'};
var prices={};
var vm={ym:'grid',tk:'grid',ai:'grid',yb:'grid'};
var vfState={ym:'',tk:'',ai:'',yb:''};
var qState={ym:'',tk:'',ai:'',yb:''};

function imgUrl(r){
  if(!r[2]||!r[3]) return null;
  return 'https://images.pokemontcg.io/'+r[2]+'/'+r[3]+'.png';
}
function vCls(v){
  var vl=v.toLowerCase();
  if(vl.indexOf('reverse')>=0) return 'vrev';
  if(vl==='jp') return 'vjp';
  if(vl==='stamped') return 'vstm';
  if(vl.indexOf('(fr)')>=0) return 'vfr';
  if(vl.indexOf('(en)')>=0) return 'ven';
  return 'vnrm';
}
function vIcon(v){
  var vl=v.toLowerCase();
  if(vl.indexOf('reverse')>=0) return '⬡ ';
  if(vl==='jp') return '🇯🇵 ';
  if(vl==='stamped') return '✦ ';
  return '';
}

function build(il){
  var el=document.getElementById('tab-'+il);
  var rows=C.filter(function(r){return r[5]===il;});
  var rev=rows.filter(function(r){return r[4].toLowerCase().indexOf('reverse')>=0;}).length;
  var jp=rows.filter(function(r){return r[4]==='JP';}).length;
  el.innerHTML='<div class="iln">'+TABS[il]+' <small style="font-size:.75rem;font-weight:400;color:var(--txm)">'+rows.length+' cartas &middot; '+rev+' reverse &middot; '+jp+' JP</small></div>'
    +'<div class="dl-bar">'
    +'<button class="dlbtn" onclick="dlAll(\''+il+'\')">&#x2B07; Descargar imágenes visibles</button>'
    +'<button class="dlbtn sec" onclick="dlScript(\''+il+'\')">&#x1F4C4; Script Python</button>'
    +'</div>'
    +'<div class="bar">'
    +'<input type="text" placeholder="Buscar nombre o set..." oninput="setQ(\''+il+'\',this.value)" id="q-'+il+'">'
    +'<select onchange="setVF(\''+il+'\',this.value)">'
    +'<option value="">Todas las versiones</option>'
    +'<option value="normal">Normal</option>'
    +'<option value="reverse">Reverse</option>'
    +'<option value="jp">JP</option>'
    +'<option value="stamped">Stamped</option>'
    +'<option value="(fr)">FR</option>'
    +'<option value="(en)">EN</option>'
    +'</select>'
    +'<button class="vb on" id="vbg-'+il+'" onclick="setV(\''+il+'\',\'grid\',this)">&#x229E; Galería</button>'
    +'<button class="vb" id="vbt-'+il+'" onclick="setV(\''+il+'\',\'table\',this)">&#x2630; Tabla</button>'
    +'</div>'
    +'<div class="tot"><span class="l">Total seleccionado</span><span class="a" id="tot-'+il+'">$ 0.00</span></div>'
    +'<div id="v-'+il+'"></div>';
  render(il);
}

function render(il){
  var rows=C.filter(function(r){return r[5]===il;});
  var q=qState[il].toLowerCase();
  var vfv=vfState[il];
  var filtered=rows.filter(function(r){
    var mq=!q||r[1].toLowerCase().indexOf(q)>=0||r[6].toLowerCase().indexOf(q)>=0;
    var mv=!vfv||r[4].toLowerCase().indexOf(vfv)>=0;
    return mq&&mv;
  });
  var cont=document.getElementById('v-'+il);
  if(!filtered.length){cont.innerHTML='<div class="nores">Sin resultados</div>';return;}

  if(vm[il]==='grid'){
    var h='<div class="grid">';
    filtered.forEach(function(r){
      var isR=r[4].toLowerCase().indexOf('reverse')>=0;
      var url=imgUrl(r);
      var uid='img-'+r[0];
      var imgH;
      if(url){
        imgH='<img id="'+uid+'" src="'+url+'" alt="'+r[1]+'" loading="lazy" onerror="handleErr(\''+uid+'\')">';
      } else {
        imgH='<div class="ph">No disponible<br><small>'+r[4]+'</small></div>';
      }
      var note=r[7]?(' <small style="color:var(--gold);font-size:.65rem">('+r[7]+')</small>'):'';
      var priceVal=prices[r[0]]||'';
      h+='<div class="ci'+(isR?' rev':'')+'"><div class="imgw">'+imgH+'</div>'
        +'<span class="vbdg '+vCls(r[4])+'">'+vIcon(r[4])+r[4]+'</span>'
        +'<div class="info">'
        +'<div class="pn">'+r[1]+note+'</div>'
        +'<div class="sn">'+r[6]+'</div>'
        +'<div class="cn">'+(r[2]||'—')+' &middot; '+(r[3]||'—')+'</div>'
        +'<div class="pr"><label>USD $</label>'
        +'<input type="number" class="pi" placeholder="0.00" step="0.01" min="0" value="'+priceVal+'" oninput="sp(\''+il+'\','+r[0]+',this.value)">'
        +'</div></div></div>';
    });
    h+='</div>';
    cont.innerHTML=h;
  } else {
    var h='<table><thead><tr><th>#</th><th>Img</th><th>Pokemon</th><th>Set</th><th>Cod</th><th>N</th><th>Version</th><th>USD $</th></tr></thead><tbody>';
    filtered.forEach(function(r){
      var isR=r[4].toLowerCase().indexOf('reverse')>=0;
      var url=imgUrl(r);
      var uid='timg-'+r[0];
      var th=url?('<img id="'+uid+'" src="'+url+'" alt="'+r[1]+'" loading="lazy" style="width:44px;height:auto;border-radius:4px" onerror="handleErr(\''+uid+'\')")>'):'—';
      var note=r[7]?('<span class="note">'+r[7]+'</span>'):'';
      var priceVal=prices[r[0]]||'';
      h+='<tr class="'+(isR?'rev':'')+'">'
        +'<td class="rn">'+r[0]+'</td>'
        +'<td>'+th+'</td>'
        +'<td class="pname">'+r[1]+note+'</td>'
        +'<td style="font-size:.79rem;color:var(--txm)">'+r[6]+'</td>'
        +'<td><span class="cb">'+(r[2]||'—')+'</span></td>'
        +'<td class="nb">'+(r[3]||'—')+'</td>'
        +'<td><span class="vspan '+vCls(r[4])+'">'+vIcon(r[4])+r[4]+'</span></td>'
        +'<td><input type="number" class="tpi" placeholder="0.00" step="0.01" min="0" value="'+priceVal+'" oninput="sp(\''+il+'\','+r[0]+',this.value)"></td>'
        +'</tr>';
    });
    h+='</tbody></table>';
    cont.innerHTML=h;
  }
  recalc(il);
}

function handleErr(uid){
  var el=document.getElementById(uid);
  if(el){
    var wrap=el.parentNode;
    el.remove();
    var ph=document.createElement('div');
    ph.className='ph';
    ph.innerHTML='Sin imagen';
    wrap.appendChild(ph);
  }
}

function sp(il,k,v){prices[k]=parseFloat(v)||0;recalc(il);}
function recalc(il){
  var t=0;
  var inputs=document.querySelectorAll('#v-'+il+' .pi, #v-'+il+' .tpi');
  for(var i=0;i<inputs.length;i++) t+=parseFloat(inputs[i].value)||0;
  document.getElementById('tot-'+il).textContent='$ '+t.toFixed(2);
}
function setQ(il,v){qState[il]=v;render(il);}
function setVF(il,v){vfState[il]=v;render(il);}
function setV(il,mode,btn){
  vm[il]=mode;
  var btns=document.querySelectorAll('#tab-'+il+' .vb');
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('on');
  btn.classList.add('on');
  render(il);
}
function showTab(il,btn){
  var tabs=document.querySelectorAll('.tab');
  for(var i=0;i<tabs.length;i++) tabs[i].classList.remove('on');
  var tbs=document.querySelectorAll('.tb');
  for(var i=0;i<tbs.length;i++) tbs[i].classList.remove('on');
  document.getElementById('tab-'+il).classList.add('on');
  btn.classList.add('on');
}

async function dlAll(il){
  var rows=C.filter(function(r){return r[5]===il&&r[2]&&r[3];});
  var q=qState[il].toLowerCase();
  var vfv=vfState[il];
  var filtered=rows.filter(function(r){
    var mq=!q||r[1].toLowerCase().indexOf(q)>=0||r[6].toLowerCase().indexOf(q)>=0;
    var mv=!vfv||r[4].toLowerCase().indexOf(vfv)>=0;
    return mq&&mv;
  });
  var seen={};
  var count=0;
  for(var i=0;i<filtered.length;i++){
    var r=filtered[i];
    var key=r[2]+'-'+r[3];
    if(seen[key]) continue;
    seen[key]=1;
    var url=imgUrl(r);
    var fname=String(r[0]).padStart(3,'0')+'_'+r[1].replace(/[^a-zA-Z0-9]/g,'_')+'_'+r[2]+'_'+r[3]+'.png';
    try{
      var resp=await fetch(url);
      var blob=await resp.blob();
      var a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download=fname;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
      count++;
      await new Promise(function(res){setTimeout(res,400);});
    }catch(e){console.warn('Error',fname,e);}
  }
  alert('Descargadas: '+count+' imágenes');
}

function dlScript(il){
  var rows=C.filter(function(r){return r[5]===il&&r[2]&&r[3];});
  var seen={};
  var lines=['#!/usr/bin/env python3','import os,urllib.request,time','os.makedirs("card_images",exist_ok=True)','cards=['];
  rows.forEach(function(r){
    var key=r[2]+'-'+r[3];
    if(seen[key]) return;
    seen[key]=1;
    var fname=String(r[0]).padStart(3,'0')+'_'+r[1].replace(/[^a-zA-Z0-9]/g,'_')+'_'+r[2]+'_'+r[3]+'.png';
    lines.push('  ("https://images.pokemontcg.io/'+r[2]+'/'+r[3]+'.png","card_images/'+fname+'"),');
  });
  lines.push(']');
  lines.push('for url,fname in cards:');
  lines.push('  if os.path.exists(fname): print("skip",fname); continue');
  lines.push('  try: urllib.request.urlretrieve(url,fname); print("OK",fname); time.sleep(0.2)');
  lines.push('  except Exception as e: print("ERR",fname,e)');
  lines.push('print("Listo")');
  var blob=new Blob([lines.join('\n')],{type:'text/plain'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='download_'+il+'.py';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

Object.keys(TABS).forEach(function(il){build(il);});
